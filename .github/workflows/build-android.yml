name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev \
          cmake libffi-dev libssl-dev \
          automake
    
    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Check project files
      run: |
        echo "=== Проверка файлов ==="
        ls -la
        echo "=== Проверка main.py ==="
        head -5 main.py
        echo "=== Проверка buildozer.spec ==="
        head -20 buildozer.spec
    
    - name: Cache Android SDK
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer/android/platform
        key: ${{ runner.os }}-android-sdk-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-android-sdk-
    
    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer -v android debug 2>&1 | tee build.log
      timeout-minutes: 300
    
    - name: Check build results
      if: always()
      run: |
        echo "=== Проверка результатов ==="
        ls -la bin/ 2>/dev/null || echo "Папка bin не найдена"
        find . -name "*.apk" 2>/dev/null || echo "APK не найден"
        echo "=== Последние 50 строк лога ==="
        tail -50 build.log 2>/dev/null || echo "Лог не найден"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sstats-apk
        path: |
          bin/*.apk
          build.log
        retention-days: 30
        if-no-files-found: warn
