name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 часов максимум
    
    steps:
    # 1. Клонирование репозитория
    - name: Checkout repository
      uses: actions/checkout@v3
    
    # 2. Установка Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    # 3. Установка системных зависимостей
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev \
          cmake libffi-dev libssl-dev \
          automake
    
    # 4. Установка buildozer
    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    # 5. Кэширование Android SDK (ускоряет повторные сборки)
    - name: Cache Android SDK
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer/android/platform
        key: ${{ runner.os }}-android-sdk-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-android-sdk-
    
    # 6. Сборка APK
    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer -v android debug
      timeout-minutes: 300  # 5 часов на сборку
    
    # 7. Загрузка APK как артефакта
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: always()  # Загружаем даже если сборка упала
      with:
        name: sstats-apk
        path: bin/*.apk
        retention-days: 30
    
    # 8. Создание Release (только для main ветки)
    - name: Create Release
      if: github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          Автоматическая сборка SStats Football Analytics
          
          **Изменения:**
          - Сборка ${{ github.sha }}
          
          **Установка:**
          1. Скачайте APK
          2. Разрешите установку из неизвестных источников
          3. Установите на Android
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
